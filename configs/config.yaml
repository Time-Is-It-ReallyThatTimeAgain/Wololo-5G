env:
  max_thr_mbps:
    eMBB:   65.0    # Changed: 5 UEs × 12 Mbps peak + 8% headroom (Halved users)
    URLLC:  30.0    # Unchanged: 5 UEs × 5 Mbps peak + 20% headroom (Remains 30 Mbps)
    mMTC:   16.0    # Changed: 10 UEs × 1.5 Mbps peak + headroom (Doubled users)
  min_thr_mbps:
    eMBB:   35.0    # Changed: 5 UEs × 7 Mbps floor (Was 70.0 for 10 UEs)
    URLLC:   2.5    # Unchanged: 5 UEs × 0.5 Mbps floor
    mMTC:    0.2    # Changed: 10 UEs × 20 Kbps floor (Was 0.1 for 5 UEs)
  max_lat_ms:
    eMBB:   30.0    # Unchanged: Strict edge/MEC delay bound
    URLLC:  10.0    # Unchanged: 3GPP 5QI=83 PDB
    mMTC:  150.0    # Unchanged: Strict delay tolerance

train:
  episodes: 500
  max_steps: 500
  save_every: 10

dqn:
  lr: 0.0001 
  gamma: 0.99
  batch_size: 64
  buffer_size: 50000
  tau: 0.001 # was 0.005
  eps_start: 1.0
  eps_end: 0.01
  eps_decay_steps: 50000  # was 20000
  grad_clip: 1.0 # Was 10.0

ppo:
  lr: 0.0003
  gamma: 0.99
  lambda_gae: 0.95
  eps_clip: 0.2
  n_steps: 1000 # changed from 2048 — must be <= max_steps
  epochs: 4
  batch_size: 64
  ent_coef: 0.01
  vf_coef: 0.5
  grad_clip: 0.5     

r2d2:
  lr: 0.0001
  gamma: 0.99
  batch_size: 32
  seq_len: 80      
  burn_in: 40
  n_step: 5 
  per_alpha: 0.6
  per_beta_start: 0.4
  per_beta_end: 1.0
  buffer_size: 100000
  grad_clip: 40.0
  target_update_every: 100      # BUG-05 fix — hard update every 100 train steps
